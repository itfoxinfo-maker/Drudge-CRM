<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PestCare CRM</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="brand">
        <div class="logo">🐜</div>
        <h1 id="login-title">PestCare CRM</h1>
        <p id="login-tagline" class="muted"></p>
      </div>
      <form id="login-form">
        <label id="lbl-email"></label>
        <input type="email" id="login-email" value="admin@pestcrm.com" required />
        <label id="lbl-password"></label>
        <input type="password" id="login-password" value="admin123" required />
        <div id="login-error" class="error hidden"></div>
        <button type="submit" id="login-btn" class="btn-primary"></button>
      </form>
      <button id="login-lang" class="link-btn"></button>
      <div class="login-hint muted">
        admin@pestcrm.com · manager@pestcrm.com · agent1@pestcrm.com · client@alnoor.com
      </div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand-sm">
        <span class="logo">🐜</span>
        <span id="brand-name"></span>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <button id="lang-toggle" class="link-btn"></button>
        <div class="user-box">
          <div id="user-name" class="user-name"></div>
          <div id="user-role" class="muted small"></div>
        </div>
        <button id="logout-btn" class="link-btn danger"></button>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div class="quick-search">
          <input id="quick-search" placeholder="" />
        </div>
        <div id="topbar-right"></div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
