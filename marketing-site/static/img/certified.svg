<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Certified, documented service">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f8f6"/><stop offset="1" stop-color="#eafaf0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="url(#bg2)"/>
  <!-- document -->
  <g transform="translate(120 60)">
    <rect x="0" y="0" width="200" height="250" rx="12" fill="#fff" stroke="#e2e8e6" stroke-width="2"/>
    <rect x="24" y="30" width="92" height="12" rx="6" fill="#1a1d24"/>
    <rect x="24" y="56" width="152" height="8" rx="4" fill="#d8e2dc"/>
    <rect x="24" y="74" width="152" height="8" rx="4" fill="#d8e2dc"/>
    <rect x="24" y="92" width="120" height="8" rx="4" fill="#d8e2dc"/>
    <rect x="24" y="122" width="152" height="8" rx="4" fill="#e7f6ee"/>
    <rect x="24" y="140" width="152" height="8" rx="4" fill="#e7f6ee"/>
    <rect x="24" y="158" width="100" height="8" rx="4" fill="#e7f6ee"/>
    <!-- signature line -->
    <path d="M24 205 q14 -16 28 0 t28 0" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
    <rect x="24" y="220" width="80" height="6" rx="3" fill="#cbd5d0"/>
  </g>
  <!-- award seal -->
  <g transform="translate(330 250)">
    <circle r="46" fill="#16a34a"/>
    <circle r="36" fill="none" stroke="#fff" stroke-width="2" opacity=".6"/>
    <path d="M-16 2 L-4 14 L18 -12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-26 36 L-14 60 L-2 46 L8 60 L20 36" fill="#0f7a37"/>
  </g>
  <!-- floating check chips -->
  <g>
    <g transform="translate(70 110)"><circle r="20" fill="#fff" stroke="#e2e8e6" stroke-width="2"/><path d="M-8 0 L-2 7 L9 -7" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(410 90)"><circle r="16" fill="#fff" stroke="#e2e8e6" stroke-width="2"/><path d="M-6 0 L-1.5 5 L7 -5.5" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
</svg>
