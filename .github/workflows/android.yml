name: Build Android APK

# Builds the PestCare Agent APK in the cloud. Run it manually from the
# Actions tab (workflow_dispatch) or it runs automatically when the Android
# project changes. The APK is attached to the run as a downloadable artifact
# and to a "android-latest" prerelease.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Point Gradle at the SDK
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk fox-crm.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fox-crm-apk
          path: fox-crm.apk

      - name: Publish to "android-latest" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Fox CRM (latest build)
          prerelease: true
          files: fox-crm.apk
